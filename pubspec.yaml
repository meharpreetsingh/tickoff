name: tickoff
description: "A minimal, streak-focused habit tracker with a built-in micro-journal."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^17.2.3

  # Dependency Injection
  get_it: ^9.2.1

  # Networking
  dio: ^5.4.2

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Local Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  path_provider: ^2.1.2

  # JSON Serialization
  json_annotation: ^4.8.1

  # Date/Time
  intl: ^0.20.2

  # Image Handling
  image_picker: 1.2.2
  image: ^4.1.7

  # UI/UX
  flutter_svg: ^2.0.10
  lottie: ^3.3.3

  # Keyboard & Input
  keyboard_dismisser: ^3.0.0

  # Analytics (optional)
  firebase_analytics: ^12.3.0
  firebase_core: ^4.7.0

  # Backup & Auth
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # Assets (uncomment after creating these directories)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
